services:
  meili-wrapper:
    image: meilisearch-lambda-wrapper-api:test
    ports:
      - "8080:8080"
    environment:
      MEILI_MASTER_KEY: "test-master-key-12345"
      MEILI_NO_ANALYTICS: "true"
      MEILI_EXPERIMENTAL_LOGS_MODE: "json"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:7700/health"]
      interval: 2s
      timeout: 5s
      retries: 5
