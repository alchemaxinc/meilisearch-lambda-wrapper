name: CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "stable"
  PRETTIER_VERSION: "3.3.3"
  COMMITLINT_CLI_VERSION: "20.2.0"

jobs:
  install-commitlint:
    runs-on: ubuntu-latest
    steps:
      - &checkout-code
        name: Checkout code (shallow)
        uses: actions/checkout@v6

      - &cache-commitlint
        name: Cache Commitlint
        id: cache-commitlint
        uses: actions/cache@v5
        with:
          path: node_modules
          key: v4-commitlint-${{ env.COMMITLINT_CLI_VERSION }}

      - name: Install Commitlint
        if: steps.cache-commitlint.outputs.cache-hit != 'true'
        run: npm i -D @commitlint/cli@${{ env.COMMITLINT_CLI_VERSION }} @commitlint/config-conventional

  run-commitlint:
    runs-on: ubuntu-latest
    needs: install-commitlint
    steps:
      - name: Checkout code (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - *cache-commitlint

      - name: Run commitlint
        run: |
          git checkout main
          git checkout -
          ./node_modules/.bin/commitlint --from main --to HEAD --verbose

  install-prettier:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - &cache-prettier
        name: Cache Prettier
        id: cache-prettier
        uses: actions/cache@v5
        with:
          path: node_modules
          key: v1-prettier-${{ env.PRETTIER_VERSION }}

      - name: Install Prettier
        if: steps.cache-prettier.outputs.cache-hit != 'true'
        run: npm i -D prettier@${{ env.PRETTIER_VERSION }}

  run-lint:
    runs-on: ubuntu-latest
    needs: install-prettier
    steps:
      - *checkout-code

      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - &cache-cargo
        name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            infrastructure/sync_versions/target
            wrapper/target
          key: v1-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: v1-cargo-

      - *cache-prettier

      - name: Run linters
        run: make lint

  run-tests:
    runs-on: ubuntu-latest
    needs: run-lint
    steps:
      - *checkout-code
      - *install-rust
      - *cache-cargo

      - name: Run unit tests
        run: make test

  test-integration:
    runs-on: ubuntu-latest
    needs: [run-lint, run-commitlint]
    steps:
      - *checkout-code

      - name: Run integration tests
        run: make test-integration
