name: Release Binary

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload the binary to (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

env:
  RUST_TOOLCHAIN: "1.94.0"
  # Rust target triple: {arch}-{vendor}-{os}-{libc}
  # "unknown" = no specific vendor; "musl" = statically linked (no glibc dependency)
  TARGET: x86_64-unknown-linux-musl

jobs:
  build-and-upload:
    name: Build and upload binary
    runs-on: ubuntu-latest

    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          owner: ${{ github.repository_owner }}
          app-id: ${{ vars.HOUSEKEEPING_BOT_APP_ID }}
          private-key: ${{ secrets.HOUSEKEEPING_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ env.TARGET }}
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/target
          key: v1-release-${{ env.TARGET }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('wrapper/Cargo.lock') }}
          restore-keys: v1-release-${{ env.TARGET }}-${{ env.RUST_TOOLCHAIN }}-

      - name: Build binary
        run: cargo build --manifest-path wrapper/Cargo.toml --release --target ${{ env.TARGET }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.tag_name }}" \
            "wrapper/target/${{ env.TARGET }}/release/meilisearch-lambda-wrapper#meilisearch-lambda-wrapper-${{ env.TARGET }}"
