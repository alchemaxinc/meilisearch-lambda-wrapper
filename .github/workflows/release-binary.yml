name: Release Binary

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload the binary to (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

env:
  RUST_TOOLCHAIN: "1.94.0"

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Rust target triple: {arch}-{vendor}-{os}-{libc}
          # "unknown" = no specific vendor; "musl" = statically linked (no glibc dependency)
          - target: x86_64-unknown-linux-musl
            packages: musl-tools
          - target: aarch64-unknown-linux-musl
            packages: musl-tools gcc-aarch64-linux-gnu

    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          owner: ${{ github.repository_owner }}
          app-id: ${{ vars.HOUSEKEEPING_BOT_APP_ID }}
          private-key: ${{ secrets.HOUSEKEEPING_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/target
          key: v1-release-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('wrapper/Cargo.lock') }}
          restore-keys: v1-release-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}-

      - name: Build binary
        run: cargo build --manifest-path wrapper/Cargo.toml --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.tag_name }}" \
            "wrapper/target/${{ matrix.target }}/release/meilisearch-lambda-wrapper#meilisearch-lambda-wrapper-${{ matrix.target }}"
